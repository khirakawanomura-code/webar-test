<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Cube 3-Contact Tracker v8.1 Fixed</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      inset: 0;
      background: #0e0e0e;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      background: #0e0e0e;
    }

    #visual {
      position: absolute;
      left: 0;
      top: 0;
      width: 240px;
      height: 240px;
      display: none;
      transform-origin: 50% 50%;
      pointer-events: none;
      border-radius: 20px;
      border: 0;
      box-sizing: border-box;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.95) 0 28%, transparent 29%),
        linear-gradient(90deg, rgba(255,255,255,.95), rgba(255,255,255,.35));
      box-shadow: none;
    }

    #visual::after {
      content: "IMAGE";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #111;
      font-weight: 900;
      font-size: 22px;
      letter-spacing: .1em;
    }

    #visual.hasImage::after {
      content: "";
      display: none;
    }

    #guide {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      color: white;
      background: rgba(0,0,0,.68);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.5;
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    #status {
      font-weight: 900;
      margin-bottom: 4px;
    }

    input[type="file"] {
      display: none;
    }

    button, #loadBtn {
      display: inline-block;
      margin-top: 8px;
      margin-right: 5px;
      padding: 7px 9px;
      border-radius: 8px;
      background: white;
      color: #111;
      font-weight: 900;
      border: 0;
      font-size: 12px;
    }

    #mode {
      font-size: 12px;
      opacity: .85;
      margin-top: 4px;
    }

    img, video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 16px;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="stage">
    <div id="visual"></div>
  </div>

  <div id="guide">
    <div id="status">3点接触で映像を表示します。</div>
    v8.1 Fixed：v8ベース。映像のみ表示＋左右/上下反転。<br>
    <label id="loadBtn">画像/動画<input id="file" type="file" accept="image/*,video/*"></label>
    <button data-offset="-90">-90°</button>
    <button data-offset="0">0°</button>
    <button data-offset="90">+90°</button>
    <button data-offset="180">180°</button>
    <button id="flipHBtn">左右反転OFF</button>
    <button id="flipVBtn">上下反転OFF</button>
    <button id="minusCenter">中心-</button>
    <button id="plusCenter">中心+</button>
    <button id="hideGuide">UI非表示</button>
    <button id="clearBtn">リセット</button>
    <div id="mode">
      角度補正: <span id="offsetText">0</span>° /
      中心係数: <span id="centerText">0.50</span> /
      左右: <span id="flipHText">OFF</span> /
      上下: <span id="flipVText">OFF</span>
    </div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const visual = document.getElementById('visual');
    const statusEl = document.getElementById('status');
    const fileInput = document.getElementById('file');
    const clearBtn = document.getElementById('clearBtn');
    const guide = document.getElementById('guide');
    const offsetText = document.getElementById('offsetText');
    const centerText = document.getElementById('centerText');
    const flipHText = document.getElementById('flipHText');
    const flipVText = document.getElementById('flipVText');
    const flipHBtn = document.getElementById('flipHBtn');
    const flipVBtn = document.getElementById('flipVBtn');

    const visualW = 240;
    const visualH = 240;

    let customMediaEl = null;
    let mousePoints = [];
    let angleOffset = Number(localStorage.getItem('cubeAngleOffset') || 0);
    let centerFactor = Number(localStorage.getItem('cubeCenterFactor') || 0.5);
    let flipH = localStorage.getItem('cubeFlipH') === 'true';
    let flipV = localStorage.getItem('cubeFlipV') === 'true';
    let lastPoints = [];

    function refreshUI() {
      offsetText.textContent = angleOffset;
      centerText.textContent = centerFactor.toFixed(2);
      flipHText.textContent = flipH ? 'ON' : 'OFF';
      flipVText.textContent = flipV ? 'ON' : 'OFF';
      flipHBtn.textContent = flipH ? '左右反転ON' : '左右反転OFF';
      flipVBtn.textContent = flipV ? '上下反転ON' : '上下反転OFF';
    }
    refreshUI();

    function block(e) { e.preventDefault(); }
    document.addEventListener('gesturestart', block, { passive: false });
    document.addEventListener('gesturechange', block, { passive: false });
    document.addEventListener('gestureend', block, { passive: false });
    document.addEventListener('touchmove', block, { passive: false });

    function getTouchPoints(e) {
      return Array.from(e.touches).slice(0, 3).map(t => ({
        x: t.clientX,
        y: t.clientY
      }));
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function getSecondLongestEdge(points) {
      const edges = [
        { a: points[0], b: points[1], rest: points[2], ids: '1-2', len: dist(points[0], points[1]) },
        { a: points[1], b: points[2], rest: points[0], ids: '2-3', len: dist(points[1], points[2]) },
        { a: points[2], b: points[0], rest: points[1], ids: '3-1', len: dist(points[2], points[0]) }
      ];
      edges.sort((x, y) => y.len - x.len);
      return edges[1];
    }

    function normalizeAngleDeg(deg) {
      while (deg <= -180) deg += 360;
      while (deg > 180) deg -= 360;
      return deg;
    }

    function update(points) {
      lastPoints = points;

      if (points.length < 3) {
        visual.style.display = 'none';
        statusEl.textContent = `${points.length}点検出中。3点揃うと表示します。`;
        return;
      }

      const edge = getSecondLongestEdge(points);

      const ex = edge.b.x - edge.a.x;
      const ey = edge.b.y - edge.a.y;
      const edgeLen = Math.hypot(ex, ey);

      if (edgeLen < 1) {
        visual.style.display = 'none';
        statusEl.textContent = '接点が近すぎます。';
        return;
      }

      const mx = (edge.a.x + edge.b.x) / 2;
      const my = (edge.a.y + edge.b.y) / 2;

      let nx = -ey / edgeLen;
      let ny = ex / edgeLen;
      const rx = edge.rest.x - mx;
      const ry = edge.rest.y - my;

      if (rx * nx + ry * ny < 0) {
        nx = -nx;
        ny = -ny;
      }

      const cx = mx + nx * edgeLen * centerFactor;
      const cy = my + ny * edgeLen * centerFactor;

      const stableEdgeX = ny;
      const stableEdgeY = -nx;
      const stableEdgeAngle = Math.atan2(stableEdgeY, stableEdgeX) * 180 / Math.PI;
      const angle = normalizeAngleDeg(stableEdgeAngle + angleOffset);

      const sx = flipH ? -1 : 1;
      const sy = flipV ? -1 : 1;

      visual.style.display = 'block';
      visual.style.transform =
        `translate(${cx - visualW / 2}px, ${cy - visualH / 2}px) rotate(${angle}deg) scale(${sx}, ${sy})`;

      statusEl.textContent = `追従中 / 前面辺:${edge.ids} / 表示角 ${angle.toFixed(1)}°`;
    }

    stage.addEventListener('touchstart', e => {
      e.preventDefault();
      update(getTouchPoints(e));
    }, { passive: false });

    stage.addEventListener('touchmove', e => {
      e.preventDefault();
      update(getTouchPoints(e));
    }, { passive: false });

    stage.addEventListener('touchend', e => {
      e.preventDefault();
      update(getTouchPoints(e));
    }, { passive: false });

    stage.addEventListener('touchcancel', e => {
      e.preventDefault();
      update(getTouchPoints(e));
    }, { passive: false });

    stage.addEventListener('mousedown', e => {
      if (e.target.closest('#guide')) return;
      mousePoints.push({ x: e.clientX, y: e.clientY });
      mousePoints = mousePoints.slice(-3);
      update(mousePoints);
    });

    stage.addEventListener('mousemove', e => {
      if (e.buttons !== 1 || mousePoints.length === 0) return;
      mousePoints[mousePoints.length - 1] = { x: e.clientX, y: e.clientY };
      update(mousePoints);
    });

    document.querySelectorAll('button[data-offset]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        angleOffset = Number(btn.dataset.offset);
        localStorage.setItem('cubeAngleOffset', String(angleOffset));
        refreshUI();
        if (lastPoints.length) update(lastPoints);
      });
    });

    flipHBtn.addEventListener('click', e => {
      e.preventDefault();
      flipH = !flipH;
      localStorage.setItem('cubeFlipH', String(flipH));
      refreshUI();
      if (lastPoints.length) update(lastPoints);
    });

    flipVBtn.addEventListener('click', e => {
      e.preventDefault();
      flipV = !flipV;
      localStorage.setItem('cubeFlipV', String(flipV));
      refreshUI();
      if (lastPoints.length) update(lastPoints);
    });

    document.getElementById('minusCenter').addEventListener('click', e => {
      e.preventDefault();
      centerFactor = Math.max(0, centerFactor - 0.05);
      localStorage.setItem('cubeCenterFactor', String(centerFactor));
      refreshUI();
      if (lastPoints.length) update(lastPoints);
    });

    document.getElementById('plusCenter').addEventListener('click', e => {
      e.preventDefault();
      centerFactor = Math.min(1.5, centerFactor + 0.05);
      localStorage.setItem('cubeCenterFactor', String(centerFactor));
      refreshUI();
      if (lastPoints.length) update(lastPoints);
    });

    document.getElementById('hideGuide').addEventListener('click', e => {
      e.preventDefault();
      guide.style.display = 'none';
    });

    clearBtn.addEventListener('click', e => {
      e.preventDefault();
      mousePoints = [];
      lastPoints = [];
      visual.style.display = 'none';
      statusEl.textContent = 'リセットしました。3点接触で表示します。';
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);

      if (customMediaEl) {
        customMediaEl.remove();
        customMediaEl = null;
      }

      visual.classList.add('hasImage');
      visual.style.background = 'transparent';
      visual.innerHTML = '';

      if (file.type.startsWith('video/')) {
        const video = document.createElement('video');
        video.src = url;
        video.autoplay = true;
        video.loop = true;
        video.muted = true;
        video.playsInline = true;
        video.setAttribute('playsinline', '');
        video.setAttribute('webkit-playsinline', '');
        visual.appendChild(video);
        video.play().catch(() => {});
        customMediaEl = video;
        statusEl.textContent = '動画を読み込みました。3点接触で表示します。';
      } else {
        const img = document.createElement('img');
        img.src = url;
        visual.appendChild(img);
        customMediaEl = img;
        statusEl.textContent = '画像を読み込みました。3点接触で表示します。';
      }
    });
  </script>
</body>
</html>

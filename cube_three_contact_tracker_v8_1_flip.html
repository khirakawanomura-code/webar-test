<!doctype html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cube 3 Contact Tracker v8.1</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#111;font-family:sans-serif}
#stage{position:fixed;inset:0}
#visual{position:absolute;width:240px;height:240px;display:none;transform-origin:center center}
#guide{position:fixed;left:10px;right:10px;bottom:10px;background:rgba(0,0,0,.7);color:#fff;padding:10px;border-radius:10px}
button,label{margin:2px}
input[type=file]{display:none}
</style></head>
<body>
<div id="stage"><div id="visual"></div></div>
<div id="guide">
<div id="status">3点接触待機</div>
<label><input id="file" type="file" accept="image/*,video/*">画像/動画</label>
<button id="flipH">左右反転 OFF</button>
<button id="flipV">上下反転 OFF</button>
<button data-offset="-90">-90°</button>
<button data-offset="0">0°</button>
<button data-offset="90">90°</button>
<button data-offset="180">180°</button>
</div>
<script>
const visual=document.getElementById('visual');
const statusEl=document.getElementById('status');
let flipH=false,flipV=false;
let angleOffset=0,lastPoints=[];

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function edge(points){
 let e=[
 {a:points[0],b:points[1],r:points[2],l:dist(points[0],points[1])},
 {a:points[1],b:points[2],r:points[0],l:dist(points[1],points[2])},
 {a:points[2],b:points[0],r:points[1],l:dist(points[2],points[0])}
 ];
 e.sort((x,y)=>y.l-x.l); return e[1];
}
function update(points){
 lastPoints=points;
 if(points.length<3){visual.style.display='none';return;}
 let ed=edge(points);
 let ex=ed.b.x-ed.a.x, ey=ed.b.y-ed.a.y;
 let len=Math.hypot(ex,ey);
 let mx=(ed.a.x+ed.b.x)/2,my=(ed.a.y+ed.b.y)/2;
 let nx=-ey/len, ny=ex/len;
 let rx=ed.r.x-mx, ry=ed.r.y-my;
 if(rx*nx+ry*ny<0){nx=-nx;ny=-ny;}
 let cx=mx+nx*len*0.5, cy=my+ny*len*0.5;
 let ang=Math.atan2(-nx,ny)*180/Math.PI + angleOffset;
 let sx=flipH?-1:1, sy=flipV?-1:1;
 visual.style.display='block';
 visual.style.transform=`translate(${cx-120}px,${cy-120}px) rotate(${ang}deg) scale(${sx},${sy})`;
 statusEl.textContent=`表示中 angle:${ang.toFixed(1)}`;
}
function pts(e){return [...e.touches].slice(0,3).map(t=>({x:t.clientX,y:t.clientY}))}
['touchstart','touchmove','touchend','touchcancel'].forEach(ev=>{
 document.addEventListener(ev,e=>{e.preventDefault();update(pts(e));},{passive:false});
});
document.querySelectorAll('[data-offset]').forEach(b=>b.onclick=()=>{angleOffset=+b.dataset.offset;if(lastPoints.length)update(lastPoints);});
document.getElementById('flipH').onclick=()=>{flipH=!flipH;event.target.textContent=`左右反転 ${flipH?'ON':'OFF'}`;if(lastPoints.length)update(lastPoints);};
document.getElementById('flipV').onclick=()=>{flipV=!flipV;event.target.textContent=`上下反転 ${flipV?'ON':'OFF'}`;if(lastPoints.length)update(lastPoints);};

document.getElementById('file').onchange=e=>{
 const f=e.target.files[0]; if(!f)return;
 const url=URL.createObjectURL(f);
 visual.innerHTML='';
 if(f.type.startsWith('video/')){
   const v=document.createElement('video');v.src=url;v.autoplay=true;v.loop=true;v.muted=true;v.playsInline=true;
   v.style.width='100%';v.style.height='100%';v.style.objectFit='contain';visual.appendChild(v);
 }else{
   const i=document.createElement('img');i.src=url;i.style.width='100%';i.style.height='100%';i.style.objectFit='contain';visual.appendChild(i);
 }
};
</script></body></html>

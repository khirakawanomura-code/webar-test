<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Cube 3-Contact Tracker v6</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      inset: 0;
      background: #0e0e0e;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }
    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      background:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    #visual {
      position: absolute;
      left: 0;
      top: 0;
      width: 240px;
      height: 240px;
      display: none;
      transform-origin: 50% 50%;
      pointer-events: none;
      border-radius: 20px;
      border: 3px solid white;
      box-sizing: border-box;
      background:
        linear-gradient(90deg, rgba(255,255,255,.95), rgba(255,255,255,.35)),
        radial-gradient(circle at center, rgba(255,255,255,.9) 0 28%, transparent 29%);
      box-shadow: 0 16px 48px rgba(0,0,0,.5);
    }
    #visual::before {
      content: "";
      position: absolute;
      left: 6%;
      top: 50%;
      width: 88%;
      height: 5px;
      transform: translateY(-50%);
      background: #111;
      border-radius: 999px;
      opacity: .85;
    }
    #visual::after {
      content: "CENTER";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #111;
      font-weight: 900;
      font-size: 20px;
      letter-spacing: .1em;
    }
    #visual.hasImage::after,
    #visual.hasImage::before { content: ""; display: none; }

    .contact {
      position: absolute;
      width: 30px;
      height: 30px;
      margin-left: -15px;
      margin-top: -15px;
      border-radius: 50%;
      background: white;
      border: 3px solid #111;
      box-sizing: border-box;
      pointer-events: none;
      box-shadow: 0 4px 14px rgba(0,0,0,.35);
      z-index: 2;
    }
    .contact span {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      font-weight: 900;
      color: #111;
    }
    #centerDot {
      position: absolute;
      width: 16px;
      height: 16px;
      margin-left: -8px;
      margin-top: -8px;
      border-radius: 50%;
      background: #fff;
      display: none;
      pointer-events: none;
      z-index: 3;
    }
    #edgeAxis, #inwardAxis {
      position: absolute;
      height: 4px;
      width: 130px;
      background: white;
      transform-origin: 0 50%;
      display: none;
      pointer-events: none;
      z-index: 3;
    }
    #inwardAxis {
      width: 80px;
      opacity: .6;
    }
    #edgeAxis::after, #inwardAxis::after {
      content: "";
      position: absolute;
      right: -10px;
      top: -6px;
      width: 0;
      height: 0;
      border-left: 12px solid white;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
    }
    #guide {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      color: white;
      background: rgba(0,0,0,.68);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.5;
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    #status { font-weight: 900; margin-bottom: 4px; }
    input[type="file"] { display: none; }
    button, #loadBtn {
      display: inline-block;
      margin-top: 8px;
      margin-right: 5px;
      padding: 7px 9px;
      border-radius: 8px;
      background: white;
      color: #111;
      font-weight: 900;
      border: 0;
      font-size: 12px;
    }
    #mode { font-size: 12px; opacity: .85; margin-top: 4px; }
  </style>
</head>

<body>
  <div id="stage">
    <div id="visual"></div>
    <div id="centerDot"></div>
    <div id="edgeAxis"></div>
    <div id="inwardAxis"></div>
  </div>

  <div id="guide">
    <div id="status">3点接触で表示します。</div>
    2番目に長い辺をキューブ前面辺として、その中点から内側へ「辺長×係数」進めた点をキューブ中心にします。<br>
    <label id="loadBtn">画像/動画<input id="file" type="file" accept="image/*,video/*"></label>
    <button data-offset="-90">-90°</button>
    <button data-offset="0">0°</button>
    <button data-offset="90">+90°</button>
    <button data-offset="180">180°</button>
    <button id="minusCenter">中心-</button>
    <button id="plusCenter">中心+</button>
    <button id="clearBtn">リセット</button>
    <div id="mode">角度補正: <span id="offsetText">0</span>° / 中心係数: <span id="centerText">0.50</span> ※55角なら理論値0.50</div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const visual = document.getElementById('visual');
    const statusEl = document.getElementById('status');
    const fileInput = document.getElementById('file');
    const clearBtn = document.getElementById('clearBtn');
    const centerDot = document.getElementById('centerDot');
    const edgeAxis = document.getElementById('edgeAxis');
    const inwardAxis = document.getElementById('inwardAxis');
    const offsetText = document.getElementById('offsetText');
    const centerText = document.getElementById('centerText');

    const visualW = 240;
    const visualH = 240;

    let contactDots = [];
    let customMediaEl = null;
    let mousePoints = [];
    let angleOffset = Number(localStorage.getItem('cubeAngleOffset') || 0);
    let centerFactor = Number(localStorage.getItem('cubeCenterFactor') || 0.5);
    let lastPoints = [];

    offsetText.textContent = angleOffset;
    centerText.textContent = centerFactor.toFixed(2);

    function block(e) { e.preventDefault(); }
    document.addEventListener('gesturestart', block, { passive: false });
    document.addEventListener('gesturechange', block, { passive: false });
    document.addEventListener('gestureend', block, { passive: false });
    document.addEventListener('touchmove', block, { passive: false });

    function clearContactDots() {
      contactDots.forEach(d => d.remove());
      contactDots = [];
    }

    function drawContactDots(points) {
      clearContactDots();
      points.forEach((p, i) => {
        const dot = document.createElement('div');
        dot.className = 'contact';
        dot.style.transform = `translate(${p.x}px, ${p.y}px)`;
        dot.innerHTML = `<span>${i + 1}</span>`;
        stage.appendChild(dot);
        contactDots.push(dot);
      });
    }

    function getTouchPoints(e) {
      return Array.from(e.touches).slice(0, 3).map(t => ({ x: t.clientX, y: t.clientY }));
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function getSecondLongestEdge(points) {
      const edges = [
        { a: points[0], b: points[1], rest: points[2], ids: '1-2', len: dist(points[0], points[1]) },
        { a: points[1], b: points[2], rest: points[0], ids: '2-3', len: dist(points[1], points[2]) },
        { a: points[2], b: points[0], rest: points[1], ids: '3-1', len: dist(points[2], points[0]) }
      ];
      edges.sort((x, y) => y.len - x.len);
      return edges[1];
    }

    function normalizeAngleDeg(deg) {
      while (deg <= -180) deg += 360;
      while (deg > 180) deg -= 360;
      return deg;
    }

    function update(points) {
      lastPoints = points;
      drawContactDots(points);

      if (points.length < 3) {
        visual.style.display = 'none';
        centerDot.style.display = 'none';
        edgeAxis.style.display = 'none';
        inwardAxis.style.display = 'none';
        statusEl.textContent = `${points.length}点検出中。3点揃うと表示します。`;
        return;
      }

      const edge = getSecondLongestEdge(points);

      const ex = edge.b.x - edge.a.x;
      const ey = edge.b.y - edge.a.y;
      const edgeLen = Math.hypot(ex, ey);
      const ux = ex / edgeLen;
      const uy = ey / edgeLen;

      const mx = (edge.a.x + edge.b.x) / 2;
      const my = (edge.a.y + edge.b.y) / 2;

      // 辺に直交する2方向のうち、残り1点がある側を内側にする
      let nx = -uy;
      let ny = ux;
      const rx = edge.rest.x - mx;
      const ry = edge.rest.y - my;
      if (rx * nx + ry * ny < 0) {
        nx = -nx;
        ny = -ny;
      }

      // キューブ中心 = 前面辺中点 + 内側方向 * 辺長 * 0.5
      // 接触位置が角から少し内側なら、中心係数を微調整
      const cx = mx + nx * edgeLen * centerFactor;
      const cy = my + ny * edgeLen * centerFactor;

      const rawAngle = Math.atan2(ey, ex) * 180 / Math.PI;
      const angle = normalizeAngleDeg(rawAngle + angleOffset);

      visual.style.display = 'block';
      visual.style.transform = `translate(${cx - visualW / 2}px, ${cy - visualH / 2}px) rotate(${angle}deg)`;

      centerDot.style.display = 'block';
      centerDot.style.transform = `translate(${cx}px, ${cy}px)`;

      edgeAxis.style.display = 'block';
      edgeAxis.style.transform = `translate(${mx}px, ${my}px) rotate(${rawAngle}deg)`;

      inwardAxis.style.display = 'block';
      inwardAxis.style.transform = `translate(${mx}px, ${my}px) rotate(${Math.atan2(ny, nx) * 180 / Math.PI}deg)`;

      statusEl.textContent = `追従中 / 前面辺:${edge.ids} / 中心=辺中点+内側${centerFactor.toFixed(2)}辺`;
    }

    stage.addEventListener('touchstart', e => { e.preventDefault(); update(getTouchPoints(e)); }, { passive: false });
    stage.addEventListener('touchmove', e => { e.preventDefault(); update(getTouchPoints(e)); }, { passive: false });
    stage.addEventListener('touchend', e => { e.preventDefault(); update(getTouchPoints(e)); }, { passive: false });
    stage.addEventListener('touchcancel', e => { e.preventDefault(); update(getTouchPoints(e)); }, { passive: false });

    stage.addEventListener('mousedown', e => {
      if (e.target.closest('#guide')) return;
      mousePoints.push({ x: e.clientX, y: e.clientY });
      mousePoints = mousePoints.slice(-3);
      update(mousePoints);
    });

    stage.addEventListener('mousemove', e => {
      if (e.buttons !== 1 || mousePoints.length === 0) return;
      mousePoints[mousePoints.length - 1] = { x: e.clientX, y: e.clientY };
      update(mousePoints);
    });

    document.querySelectorAll('button[data-offset]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        angleOffset = Number(btn.dataset.offset);
        localStorage.setItem('cubeAngleOffset', String(angleOffset));
        offsetText.textContent = angleOffset;
        if (lastPoints.length) update(lastPoints);
      });
    });

    document.getElementById('minusCenter').addEventListener('click', e => {
      e.preventDefault();
      centerFactor = Math.max(0, centerFactor - 0.05);
      localStorage.setItem('cubeCenterFactor', String(centerFactor));
      centerText.textContent = centerFactor.toFixed(2);
      if (lastPoints.length) update(lastPoints);
    });

    document.getElementById('plusCenter').addEventListener('click', e => {
      e.preventDefault();
      centerFactor = Math.min(1.5, centerFactor + 0.05);
      localStorage.setItem('cubeCenterFactor', String(centerFactor));
      centerText.textContent = centerFactor.toFixed(2);
      if (lastPoints.length) update(lastPoints);
    });

    clearBtn.addEventListener('click', e => {
      e.preventDefault();
      mousePoints = [];
      lastPoints = [];
      clearContactDots();
      visual.style.display = 'none';
      centerDot.style.display = 'none';
      edgeAxis.style.display = 'none';
      inwardAxis.style.display = 'none';
      statusEl.textContent = 'リセットしました。3点接触で表示します。';
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files?.[0];
      if (!file) return;
      const url = URL.createObjectURL(file);

      if (customMediaEl) {
        customMediaEl.remove();
        customMediaEl = null;
      }

      visual.classList.add('hasImage');
      visual.style.background = '#000';

      if (file.type.startsWith('video/')) {
        const video = document.createElement('video');
        video.src = url;
        video.autoplay = true;
        video.loop = true;
        video.muted = true;
        video.playsInline = true;
        video.style.width = '100%';
        video.style.height = '100%';
        video.style.objectFit = 'contain';
        video.style.borderRadius = '16px';
        visual.appendChild(video);
        video.play().catch(() => {});
        customMediaEl = video;
        statusEl.textContent = '動画を読み込みました。3点接触で表示します。';
      } else {
        const img = document.createElement('img');
        img.src = url;
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'contain';
        img.style.borderRadius = '16px';
        visual.appendChild(img);
        customMediaEl = img;
        statusEl.textContent = '画像を読み込みました。3点接触で表示します。';
      }
    });
  </script>
</body>
</html>

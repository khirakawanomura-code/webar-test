<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Cube 3-Contact Tracker v4</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      inset: 0;
      background: #0e0e0e;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }
    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      background:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    #visual {
      position: absolute;
      left: 0;
      top: 0;
      width: 240px;
      height: 240px;
      display: none;
      transform-origin: 50% 50%;
      pointer-events: none;
      border-radius: 22px;
      border: 3px solid white;
      box-sizing: border-box;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.96) 0 32%, rgba(255,255,255,.58) 33% 36%, transparent 37%),
        conic-gradient(from 0deg, rgba(255,255,255,.95), rgba(255,255,255,.25), rgba(255,255,255,.95));
      box-shadow: 0 16px 48px rgba(0,0,0,.5);
    }
    #visual::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 5%;
      width: 6px;
      height: 34%;
      transform: translateX(-50%);
      background: #111;
      border-radius: 999px;
      opacity: .85;
    }
    #visual::after {
      content: "FRONT";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #111;
      font-weight: 900;
      font-size: 24px;
      letter-spacing: .12em;
    }
    #visual.hasImage::after { content: ""; }
    .contact {
      position: absolute;
      width: 30px;
      height: 30px;
      margin-left: -15px;
      margin-top: -15px;
      border-radius: 50%;
      background: white;
      border: 3px solid #111;
      box-sizing: border-box;
      pointer-events: none;
      box-shadow: 0 4px 14px rgba(0,0,0,.35);
      z-index: 2;
    }
    .contact span {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      font-weight: 900;
      color: #111;
    }
    #centerDot {
      position: absolute;
      width: 14px;
      height: 14px;
      margin-left: -7px;
      margin-top: -7px;
      border-radius: 50%;
      background: #fff;
      display: none;
      pointer-events: none;
      z-index: 3;
    }
    #frontAxis {
      position: absolute;
      height: 4px;
      width: 110px;
      background: white;
      transform-origin: 0 50%;
      display: none;
      pointer-events: none;
      z-index: 3;
    }
    #frontAxis::after {
      content: "";
      position: absolute;
      right: -10px;
      top: -6px;
      width: 0;
      height: 0;
      border-left: 12px solid white;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
    }
    #guide {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      color: white;
      background: rgba(0,0,0,.62);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.55;
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    #status { font-weight: 900; margin-bottom: 4px; }
    input[type="file"] { display: none; }
    button, #loadBtn {
      display: inline-block;
      margin-top: 8px;
      margin-right: 6px;
      padding: 7px 10px;
      border-radius: 8px;
      background: white;
      color: #111;
      font-weight: 900;
      border: 0;
      font-size: 13px;
    }
    #mode { font-size: 12px; opacity: .8; margin-top: 4px; }
  </style>
</head>

<body>
  <div id="stage">
    <div id="visual"></div>
    <div id="centerDot"></div>
    <div id="frontAxis"></div>
  </div>

  <div id="guide">
    <div id="status">キューブの3接点が画面に触れると映像が出ます。</div>
    3辺のうち「2番目に長い辺」を前面辺として使います。残りの1点で前後方向を判定し、映像は歪ませず移動・回転だけ追従します。<br>
    <label id="loadBtn">
      映像/画像を差し替える
      <input id="file" type="file" accept="image/*,video/*">
    </label>
    <button id="clearBtn">リセット</button>
    <div id="mode">PCではクリック3回で仮テストできます。iPhoneはホーム画面追加で安定しやすいです。</div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const visual = document.getElementById('visual');
    const statusEl = document.getElementById('status');
    const fileInput = document.getElementById('file');
    const clearBtn = document.getElementById('clearBtn');
    const centerDot = document.getElementById('centerDot');
    const frontAxis = document.getElementById('frontAxis');

    const visualW = 240;
    const visualH = 240;

    let contactDots = [];
    let customMediaEl = null;
    let mousePoints = [];

    function block(e) { e.preventDefault(); }
    document.addEventListener('gesturestart', block, { passive: false });
    document.addEventListener('gesturechange', block, { passive: false });
    document.addEventListener('gestureend', block, { passive: false });
    document.addEventListener('touchmove', block, { passive: false });

    function clearContactDots() {
      contactDots.forEach(d => d.remove());
      contactDots = [];
    }

    function drawContactDots(points) {
      clearContactDots();
      points.forEach((p, i) => {
        const dot = document.createElement('div');
        dot.className = 'contact';
        dot.style.transform = `translate(${p.x}px, ${p.y}px)`;
        dot.innerHTML = `<span>${i + 1}</span>`;
        stage.appendChild(dot);
        contactDots.push(dot);
      });
    }

    function getTouchPoints(e) {
      return Array.from(e.touches).slice(0, 3).map(t => ({ x: t.clientX, y: t.clientY }));
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function getSecondLongestEdge(points) {
      const edges = [
        { a: points[0], b: points[1], rest: points[2], ids: '1-2', len: dist(points[0], points[1]) },
        { a: points[1], b: points[2], rest: points[0], ids: '2-3', len: dist(points[1], points[2]) },
        { a: points[2], b: points[0], rest: points[1], ids: '3-1', len: dist(points[2], points[0]) }
      ];
      edges.sort((x, y) => y.len - x.len);
      return edges[1];
    }

    function normalizeAngleDeg(deg) {
      while (deg <= -180) deg += 360;
      while (deg > 180) deg -= 360;
      return deg;
    }

    function update(points) {
      drawContactDots(points);

      if (points.length < 3) {
        visual.style.display = 'none';
        centerDot.style.display = 'none';
        frontAxis.style.display = 'none';
        statusEl.textContent = `${points.length}点検出中。3点揃うと映像を表示します。`;
        return;
      }

      const cx = (points[0].x + points[1].x + points[2].x) / 3;
      const cy = (points[0].y + points[1].y + points[2].y) / 3;

      const frontEdge = getSecondLongestEdge(points);

      const mx = (frontEdge.a.x + frontEdge.b.x) / 2;
      const my = (frontEdge.a.y + frontEdge.b.y) / 2;

      // 残りの1点から、前面辺の中点へ向かう方向を「前」として読む
      // 表示が180°逆なら、下の +90 を -90 に変更
      const angle = normalizeAngleDeg(Math.atan2(my - frontEdge.rest.y, mx - frontEdge.rest.x) * 180 / Math.PI + 90);

      visual.style.display = 'block';
      visual.style.transform = `translate(${cx - visualW / 2}px, ${cy - visualH / 2}px) rotate(${angle}deg)`;

      centerDot.style.display = 'block';
      centerDot.style.transform = `translate(${cx}px, ${cy}px)`;

      frontAxis.style.display = 'block';
      frontAxis.style.transform = `translate(${cx}px, ${cy}px) rotate(${angle - 90}deg)`;

      statusEl.textContent = `追従中 / 前面辺:${frontEdge.ids} / 回転 ${angle.toFixed(1)}°`;
    }

    stage.addEventListener('touchstart', e => { e.preventDefault(); update(getTouchPoints(e)); }, { passive: false });
    stage.addEventListener('touchmove', e => { e.preventDefault(); update(getTouchPoints(e)); }, { passive: false });
    stage.addEventListener('touchend', e => { e.preventDefault(); update(getTouchPoints(e)); }, { passive: false });
    stage.addEventListener('touchcancel', e => { e.preventDefault(); update(getTouchPoints(e)); }, { passive: false });

    stage.addEventListener('mousedown', e => {
      if (e.target.closest('#guide')) return;
      mousePoints.push({ x: e.clientX, y: e.clientY });
      mousePoints = mousePoints.slice(-3);
      update(mousePoints);
    });

    stage.addEventListener('mousemove', e => {
      if (e.buttons !== 1 || mousePoints.length === 0) return;
      mousePoints[mousePoints.length - 1] = { x: e.clientX, y: e.clientY };
      update(mousePoints);
    });

    clearBtn.addEventListener('click', e => {
      e.preventDefault();
      mousePoints = [];
      clearContactDots();
      visual.style.display = 'none';
      centerDot.style.display = 'none';
      frontAxis.style.display = 'none';
      statusEl.textContent = 'リセットしました。3点接触で映像を表示します。';
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files?.[0];
      if (!file) return;
      const url = URL.createObjectURL(file);

      if (customMediaEl) {
        customMediaEl.remove();
        customMediaEl = null;
      }

      visual.classList.add('hasImage');
      visual.style.background = '#000';

      if (file.type.startsWith('video/')) {
        const video = document.createElement('video');
        video.src = url;
        video.autoplay = true;
        video.loop = true;
        video.muted = true;
        video.playsInline = true;
        video.style.width = '100%';
        video.style.height = '100%';
        video.style.objectFit = 'contain';
        video.style.borderRadius = '18px';
        visual.appendChild(video);
        video.play().catch(() => {});
        customMediaEl = video;
        statusEl.textContent = '動画を読み込みました。3点接触で表示します。';
      } else {
        const img = document.createElement('img');
        img.src = url;
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'contain';
        img.style.borderRadius = '18px';
        visual.appendChild(img);
        customMediaEl = img;
        statusEl.textContent = '画像を読み込みました。3点接触で表示します。';
      }
    });
  </script>
</body>
</html>
